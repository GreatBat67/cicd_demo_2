name: "Standard Tier: Automated Snowflake Delivery - Master"
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
    paths:
      - 'dcm_automation/**'
      - 'dcm_dbt_cicd/**'
  push:
    branches:
      - main
    paths:
      - 'dcm_automation/**'
      - 'dcm_dbt_cicd/**'

permissions:
  id-token: write 
  contents: read

jobs:
  main-business-approval-gate:
    if: github.base_ref == 'main' && github.event_name == 'pull_request'
    uses: ./.github/workflows/business-email-gate-main.yml
    secrets: inherit
  main-environment-pipeline:
    if: github.ref_name == 'main' && github.event_name == 'push'
    needs: main-business-approval-gate
    uses: ./.github/workflows/snowflake-pipeline-main.yml
    secrets: inherit
