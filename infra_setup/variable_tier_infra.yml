# Global Repository Metadata
owner: "GreatBat67"
repo_name: "cicd_demo_2"
project_name: "Snowflake Variable-Tier Offering Template"

# Code Paths to Monitor for Changes
paths:
  - "dcm_automation/**"
  - "dcm_dbt_cicd/**"

# Global Snowflake Infrastructure Configuration
sf_account: "KIPI-KIPI_PRIMARY"
sf_role: "github_cicd_demo_role"
sf_warehouse: "github_cicd_demo_wh"

# Dynamic Project Directory Naming Parameters (No Hardcoding)
dcm_project_dir: "dcm_automation"
dbt_source_dir: "./dcm_dbt_cicd"
dbt_project_dev: "dbt_project_dev"
dbt_project_prod: "dbt_project_prod"

# The Progression Order of Branches (Lowest to Highest)
branch_sequence:
  - "dev"
  - "qa"
  - "cicd"
  - "main"

# Decoupled Blueprint Environment Mapping Matrix
branch_data:
  dev:
    require_pr: false
    required_approvals: 0
    approvers: []
    has_snowflake: false
    has_email_gate: false

  qa:
    require_pr: true
    required_approvals: 1
    approvers:
      - "disharaniBR"
    has_snowflake: true
    sf_user: "github_cicd_demo_qa_user"
    sf_db: "CICD_AUTOMATION_QA"
    sf_schema: "UTILITIES"
    dcm_target: "DCM_QA"
    has_email_gate: false
  
  cicd:
    require_pr: true
    required_approvals: 1
    approvers:
      - "disharaniBR"
    has_snowflake: true
    sf_user: "github_cicd_demo_cicd_user"
    sf_db: "CICD_AUTOMATION_PROD"
    sf_schema: "UTILITIES"
    dcm_target: "DCM_PROD"
    has_email_gate: false

  main:
    require_pr: true
    required_approvals: 1
    approvers:
      - "DisharaniBR"
    has_snowflake: true
    sf_user: "github_cicd_demo_prod_user"
    sf_db: "CICD_AUTOMATION_PROD"
    sf_schema: "UTILITIES"
    dcm_target: "DCM_PROD"
    has_email_gate: false